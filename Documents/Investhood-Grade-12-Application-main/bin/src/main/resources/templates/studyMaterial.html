<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Materials</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to right, rgba(52, 73, 94, 0.9), rgba(44, 62, 80, 0.9)), 
                url('/images/resources_background.jpg');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
        }

        h2 {
            text-align: center;
            color: #f39c12;
        }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="file"] {
            padding: 10px;
            background: white;
            color: black;
            border-radius: 5px;
        }

        button {
            padding: 10px;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #e67e22;
        }

        .materials-list {
            margin-top: 20px;
        }

        .material-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .material-item a {
            color: #f39c12;
            text-decoration: none;
        }

        .material-item a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Study Materials</h2>

        <!-- Upload Form -->
        <form class="upload-form" id="uploadForm">
            <input type="file" id="fileInput" required>
            <button type="submit">Upload</button>
        </form>

        <!-- List of Study Materials -->
        <div class="materials-list" id="materialsList">
            <!-- Materials will be loaded here using JavaScript -->
        </div>
    </div>

    <script>
        document.getElementById("uploadForm").addEventListener("submit", function(event) {
            event.preventDefault();
            alert("File uploaded successfully! (Backend needed)");
        });

        // Sample data (Replace with backend integration)
        const materials = [
            { name: "Math Notes.pdf", url: "/uploads/math_notes.pdf" },
            { name: "Physics Formula Sheet.docx", url: "/uploads/physics_formula.docx" },
            { name: "History Notes.pptx", url: "/uploads/history_notes.pptx" }
        ];

        function loadMaterials() {
            const list = document.getElementById("materialsList");
            list.innerHTML = "";
            materials.forEach(material => {
                const div = document.createElement("div");
                div.className = "material-item";
                div.innerHTML = `<span>${material.name}</span> <a href="${material.url}" download>Download</a>`;
                list.appendChild(div);
            });
        }

        loadMaterials();
    </script>

</body>
</html>

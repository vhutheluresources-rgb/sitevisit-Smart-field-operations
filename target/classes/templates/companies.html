<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSRF Token Meta Tags (Spring Boot Security) -->
<meta name="_csrf" content="${_csrf.token}" th:if="${_csrf}">
<meta name="_csrf_header" content="${_csrf.headerName}" th:if="${_csrf}">
    <title>Company Management | SiteVisit</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/companies.css">
</head>

<script>
// Debug: Check if user info exists in storage
document.addEventListener('DOMContentLoaded', () => {
    const storedUser = localStorage.getItem('currentUser');
    console.log('Stored user:', storedUser);
    
    if (storedUser) {
        try {
            const user = JSON.parse(storedUser);
            document.querySelector('.profile-info strong').textContent = user.fullName || user.name || 'User';
            document.querySelector('.profile-info span').textContent = user.role || 'Member';
            
            // Generate initials for avatar
            const name = user.fullName || user.name || 'U';
            const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
            document.querySelector('.avatar').textContent = initials;
            
            console.log('✅ Profile updated from localStorage');
        } catch (e) {
            console.error('❌ Error parsing user:', e);
        }
    } else {
        console.warn('⚠️ No user found in localStorage - user may not be logged in');
    }
});
</script>

<body>
    <div class="dashboard-shell">
        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar">
            <div class="sidebar-logo-container">
                <div class="logo-badge">
                    <img src="/images/siteVisit logo.png" alt="SiteVisit Logo">
                </div>
                <div class="sidebar-brand">
                    <strong>SiteVisit</strong>
                    <span>Operations Panel</span>
                </div>
            </div>
            
            <nav class="sidebar-links">
                <a href="/dashboard.html" class="nav-link">
                    <i class='bx bx-grid-alt'></i>
                    <span>Dashboard</span>
                </a>
                <a href="/companies.html" class="nav-link active">
                    <i class='bx bx-buildings'></i>
                    <span>Company Management</span>
                </a>
                <a href="/members.html" class="nav-link">
                    <i class='bx bx-group'></i>
                    <span>Member Management</span>
                </a>
                <a href="/reports.html" class="nav-link">
                    <i class='bx bx-bar-chart-alt-2'></i>
                    <span>Reports</span>
                </a>
                <a href="/" class="nav-link" style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 1rem;">
                    <i class='bx bx-log-out'></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="dashboard-content">
            <header class="topbar">
                <div class="header-text">
                    <h2>Company Management</h2>
                    <p>Manage all registered companies in the system.</p>
                </div>
                <div class="user-profile">
                    <!-- <div class="profile-info">
                        <strong>Lindokuhle Zulu</strong>
                        <span>Administrator</span>
                    </div>  -->
                    <div class="avatar">LZ</div>
                </div>
            </header>

            <!-- ===== FORM SECTION ===== -->
            <div class="panel">
                <div class="panel-header">
                    <h3 id="formTitle">Add Company</h3>
                </div>
                <div class="form-container">
                    <form id="companyForm" class="grid-form">
                        <input type="hidden" id="compId">
                        
                        <div class="input-field">
                            <label for="name">Company Name *</label>
                            <input type="text" id="name" placeholder="Enter company name" required>
                        </div>
                        
                        <div class="input-field">
                            <label for="regNumber">Registration Number *</label>
                            <input type="text" id="regNumber" placeholder="CIPC Reg No" required>
                        </div>
                        
                        <div class="input-field">
                            <label for="email">Email Address *</label>
                            <input type="email" id="email" placeholder="contact@company.co.za" required>
                        </div>
                        
                        <div class="input-field">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" placeholder="+27 XX XXX XXXX">
                        </div>

                        <div class="input-field">
                            <label for="address">Address</label>
                            <input type="text" id="address" placeholder="Company physical address">
                        </div>
                        
                        <div class="input-field">
                            <label for="status">Status</label>
                            <select id="status">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                        
                        <div class="form-btn-area">
                            <button type="submit" id="saveBtn" class="btn-save">
                                <i class='bx bx-plus'></i> Save Company
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- ===== TABLE SECTION ===== -->
            <div class="panel">
                <div class="table-header">
                    <h3>Registered Companies</h3>
                    <button id="viewAllBtn" class="btn-primary">
                        <i class='bx bx-refresh'></i> View All
                    </button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Reg Number</th>
                                <th>Company Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="companyTableBody">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 2rem; color: #6b7280;">
                                    <i class='bx bx-loader-alt bx-spin' style="font-size: 24px; margin-right: 8px;"></i>
                                    Loading companies...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/companies.js"></script>
</body>
</html>

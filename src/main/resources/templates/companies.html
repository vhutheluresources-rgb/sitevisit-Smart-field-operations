<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Management | SiteVisit</title>
    <!-- Boxicons for Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/companies.css">
</head>
<body>
    <div class="dashboard-shell">
        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar">
            <!-- Logo Badge -->
            <div class="sidebar-logo-container">
                <div class="logo-badge">
                    <img src="/images/siteVisit logo.png" alt="SiteVisit Logo">
                </div>
            </div>
            
            <!-- Navigation Links -->
            <nav class="sidebar-links">
                <a href="/dashboard.html" class="nav-link">
                    <i class='bx bx-grid-alt'></i>
                    <span>Dashboard</span>
                </a>
                <a href="/companies.html" class="nav-link active">
                    <i class='bx bx-buildings'></i>
                    <span>Company Management</span>
                </a>
                <a href="/members.html" class="nav-link">
                    <i class='bx bx-group'></i>
                    <span>Member Management</span>
                </a>
                <a href="/reports.html" class="nav-link">
                    <i class='bx bx-bar-chart-alt-2'></i>
                    <span>Reports</span>
                </a>
                <a href="/" class="nav-link" style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 1rem;">
                    <i class='bx bx-log-out'></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="dashboard-content">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="header-text">
                    <h2>Company Management</h2>
                    <p>Manage all registered companies in the system.</p>
                </div>
                <div class="user-profile">
                    <div class="profile-info">
                        <strong>Lindokuhle Zulu</strong>
                        <span>Administrator</span>
                    </div>
                    <div class="avatar">LZ</div>
                </div>
            </header>

            <!-- ===== FORM SECTION (Requirement 1: Create/Update) ===== -->
            <div class="panel">
                <div class="panel-header">
                    <h3 id="formTitle">Add Company</h3>
                </div>
                <form id="companyForm" class="grid-form">
                    <input type="hidden" id="compId">
                    
                    <div class="input-field">
                        <label for="name">Company Name</label>
                        <input type="text" id="name" placeholder="Enter company name" required>
                    </div>
                    
                    <div class="input-field">
                        <label for="regNumber">Registration Number</label>
                        <input type="text" id="regNumber" placeholder="CIPC Reg No" required>
                    </div>
                    
                    <div class="input-field">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="contact@company.co.za" required>
                    </div>
                    
                    <div class="input-field">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="+27 XX XXX XXXX">
                    </div>
                    
                    <div class="input-field">
                        <label for="status">Status</label>
                        <select id="status">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                    
                    <div class="form-btn-area">
                        <button type="submit" id="saveBtn" class="btn-primary">Save Company</button>
                    </div>
                </form>
            </div>

            <!-- ===== TABLE SECTION (Requirement 2: Read + Requirement 3: Edit/Delete) ===== -->
            <div class="panel">
                <div class="panel-header">
                    <h3>Registered Companies</h3>
                    <button id="viewAllBtn" class="btn-primary" style="background: #64748b; font-size: 12px; padding: 8px 16px;">
                        <i class='bx bx-refresh'></i> View All / Refresh
                    </button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Reg Number</th>
                                <th>Company Name</th>
                                <th>Email</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="companyTableBody">
                            <!-- Loading state -->
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 2rem; color: #64748b;">
                                    <i class='bx bx-loader-alt bx-spin' style="font-size: 24px; margin-right: 8px;"></i>
                                    Loading companies...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- JavaScript -->
    <script src="/js/companies.js"></script>
</body>
</html>

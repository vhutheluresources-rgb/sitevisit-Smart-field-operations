<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | SiteVisit</title>
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-panel">
    <div class="auth-brand">
      <img src="/images/siteVisit logo.png" alt="SiteVisit Logo" class="auth-logo" />
      <div>
        <h1>SiteVisit</h1>
        <p>Smart Field Operations</p>
      </div>
    </div>

    <div class="auth-card">
      <div class="auth-badge">Account Recovery</div>
      <h2>Reset Password</h2>
      <p class="auth-subtitle">
        Enter your reset token and create a new password.
      </p>

      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="token">Reset Token</label>
          <input
                  type="text"
                  id="token"
                  required
                  placeholder="Enter reset token"
          />
        </div>

        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input
                  type="password"
                  id="newPassword"
                  required
                  placeholder="Enter new password"
          />
        </div>

        <div id="messageBox" class="message-box" style="display: none;"></div>

        <button type="submit" class="auth-btn">
          Reset Password
        </button>
      </form>

      <div class="auth-footer-link">
        <a href="/login.html">← Back to Login</a>
      </div>
    </div>
  </div>
</div>

<script src="/js/reset-password.js"></script>
</body>
</html>
